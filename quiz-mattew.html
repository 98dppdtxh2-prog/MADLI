<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მათეს სახარება</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<body>

<div id="header"></div>

<div class="quiz-container">
  <button class="back-btn" onclick="location.href='quizzes.html'">← უკან დაბრუნება</button>

    <div id="quiz-intro-matthew" class="quiz-intro-card">
  <div class="quiz-cross">☦</div>

  <h1>მათეს სახარების ქვიზი</h1>

  <div class="divider"></div>

  <p>
    📖 <b>10 კითხვა</b><br>
    ⏱️ სავარაუდო დრო: <b>5 წუთი</b><br>
    ⭐ სირთულე: <span>მარტივი</span><br><br>
    ✝️ გამოსცადე შენი ცოდნა წმინდა მათეს სახარების შესახებ.
  </p>

  <p class="quiz-quote">"ყოველი, ვინც ეძებს, ჰპოვებს."</p>

  <button class="btn btn-primary" onclick="startMatthew()">დაწყება →</button>
</div>

  <div id="quiz-play-area" style="display:none;">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <p id="progress-text"></p>

    <div class="question-box">
      <p id="question-text"></p>
    </div>

    <div id="options-grid"></div>

    <div id="feedback-box"></div>

    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;">
      შემდეგი კითხვა →
    </button>
  </div>

  <div id="quiz-result-area" style="display:none;">
    <h2>შედეგი</h2>
    <div id="result-score">0</div>
    <p>სწორი პასუხი 10-დან</p>
    <p id="result-message"></p>

    <button class="btn btn-primary" onclick="restartQuiz()">თავიდან ცდა</button>
    <button class="btn btn-outline" onclick="location.href='quizzes.html'">სხვა ქვიზი</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</body>
</html>
