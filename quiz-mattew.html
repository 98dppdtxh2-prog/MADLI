<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მათეს სახარება</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="back-btn" onclick="location.href='quizzes.html'">← უკან დაბრუნება</button>
<div id="quiz-intro-matthew" class="quiz-intro-card">
  <div class="quiz-ornament">❦ ☦ ❦</div>

  <h1>მათეს სახარების ქვიზი</h1>

  <div class="quiz-line"></div>

  <div class="quiz-info">
    <p>📖 10 კითხვა</p>
    <p>⏱️ სავარაუდო დრო: 5 წუთი</p>
    <p>⭐ სირთულე: მარტივი</p>
  </div>

  <p class="quiz-desc">
    გამოსცადე შენი ცოდნა წმინდა მათეს სახარების შესახებ.
  </p>

  <button class="btn btn-primary" onclick="startMatthew()">☦ ქვიზის დაწყება</button>
</div>
  <div id="quiz-play-area" style="display:none;">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <p id="progress-text"></p>

    <div class="question-box">
      <p id="question-text"></p>
    </div>

    <div id="options-grid"></div>

    <div id="feedback-box"></div>

    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;">
      შემდეგი კითხვა →
    </button>
  </div>

<div id="quiz-result-area" style="display:none;">
  <div class="quiz-result-card">
    <div class="quiz-ornament">❦ ☦ ❦</div>

    <h2>ქვიზის შედეგი</h2>

    <div class="result-score-big">
      <span id="result-score">0</span>/10
    </div>

    <p class="result-label">სწორი პასუხი</p>

    <p id="result-message" class="result-message"></p>

    <div class="result-actions">
      <button class="btn btn-primary" onclick="restartQuiz()">თავიდან ცდა</button>
      <button class="btn btn-outline" onclick="location.href='quizzes.html'">სხვა ქვიზი</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
