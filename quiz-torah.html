<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>თორა - მოსეს ხუთტომეული</title>
    <link rel="stylesheet" href="style.css">

    <meta property="og:title" content="თორის ქვიზი | madli.ge">

<meta property="og:description" content="📜 შეამოწმე შენი ცოდნა თორას — მოსეს ხუთწიგნეულის შესახებ. უპასუხე 15 რთულ კითხვას დაბადებიდან, გამოსვლიდან, ლევიანთადან, რიცხვნიდან და მეორე რჯულიდან.">

<meta property="og:image" content="https://98dppdtxh2-prog.github.io/MADLI/torah-preview.jpg">

<meta property="og:url" content="https://98dppdtxh2-prog.github.io/MADLI/quiz-torah.html">

<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
</head>
<body>
    <div id="header"></div>
    
    <button class="back-btn" onclick="location.href='quizzes.html'">← უკან დაბრუნება</button>
<div id="quiz-intro-torah" class="quiz-intro-card">
  <div class="quiz-ornament">❦ ☦ ❦</div>

  <h1>თორა — მოსეს ხუთწიგნეულის ქვიზი</h1>

  <div class="quiz-line"></div>

  <div class="quiz-info">
    <p>📖 15 კითხვა</p>
    <p>⏱️ სავარაუდო დრო: 8-10 წუთი</p>
    <p>⭐ სირთულე: რთული</p>
  </div>

  <p class="quiz-desc">
  გამოსცადე შენი ცოდნა თორას — მოსეს ხუთი წიგნის შესახებ. ქვიზი მოიცავს დაბადების, გამოსვლის, ლევიანთა, რიცხვთა და მეორე რჯულის წიგნებს.
</p>

  <button class="btn btn-primary" onclick="startTorah()">☦ ქვიზის დაწყება</button>
</div>
  <div id="quiz-torah-play-area" style="display:none;">
    <div class="progress-bar">
      <div class="progress-fill" id="torah-progress-fill"></div>
    </div>

    <p id="torah-progress-text"></p>

    <div class="question-box">
      <p id="torah-question-text"></p>
    </div>

    <div id="torah-options-grid"></div>

    <div id="torah-feedback-box"></div>

    <button class="btn btn-primary" id="torah-next-btn" onclick="torahNext()" style="display:none;">
      შემდეგი კითხვა →
    </button>
  </div>

<div id="quiz-torah-result-area" style="display:none;">

<div class="quiz-result-card">

<div class="quiz-cross">☦</div>

<h2 id="result-title"></h2>

<div class="result-score-big">
<span id="torah-result-score"></span>/15
</div>

<div id="result-stars" class="result-stars"></div>

<p id="torah-result-message" class="result-message"></p>

<button class="btn btn-primary" onclick="startTorah()">
თავიდან ცდა
</button>

<button class="btn btn-outline" onclick="location.href='quizzes.html'">
სხვა ქვიზი
</button>

</div>

</div>


<script>
fetch('header.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('header').innerHTML = data;
  });
</script>

<script src="script.js"></script>
</body>
</html>
